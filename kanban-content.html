<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentFlow — Kanban Créateur</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --sb:#16181d;--sbw:220px;--bg:#f0f2f7;--white:#fff;
  --t1:#1a1d23;--t2:#6b7280;--tm:#9ca3af;
  --border:#e5e7eb;--acc:#ff6b35;--acc-light:#fff3ef;
  --s1:0 1px 3px rgba(0,0,0,.08);--s2:0 4px 12px rgba(0,0,0,.10);--s3:0 8px 24px rgba(0,0,0,.14);
  --r:12px;--rsm:8px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);height:100vh;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:var(--sbw);background:var(--sb);display:flex;flex-direction:column;padding:22px 0;flex-shrink:0;z-index:10}
.sb-logo{padding:0 18px 24px;display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:34px;height:34px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:900;flex-shrink:0}
.sb-logo-txt{color:#fff;font-size:15px;font-weight:700;letter-spacing:-.3px}
.sb-nav{flex:1;padding:0 10px}
.nav-sec{color:#374151;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:0 8px;margin:14px 0 4px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;color:#9ca3af;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.06);color:#e5e7eb}
.ni.act{background:rgba(255,107,53,.15);color:var(--acc)}
.ni-ic{width:16px;text-align:center;font-size:14px;flex-shrink:0}
.sb-foot{padding:14px 16px 0;border-top:1px solid rgba(255,255,255,.06)}
.u-row{display:flex;align-items:center;gap:9px}
.u-av{width:34px;height:34px;background:linear-gradient(135deg,#ff6b35,#f59e0b);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.u-name{color:#e5e7eb;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-role{color:#4b5563;font-size:11px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── TOPBAR ── */
.topbar{background:var(--white);padding:14px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-l{flex:1;min-width:0}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.4px}
.tabs{display:flex;gap:3px;margin-top:7px}
.tab{padding:3px 12px;border-radius:5px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;border:none;background:none;transition:all .15s}
.tab.act{background:var(--acc);color:#fff}
.tab:not(.act):hover{background:var(--bg)}
.topbar-r{display:flex;align-items:center;gap:8px}
.searchbar{display:flex;align-items:center;gap:7px;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:6px 12px;min-width:180px}
.searchbar input{border:none;background:none;outline:none;font-size:13px;color:var(--t1);width:100%}
.searchbar input::placeholder{color:var(--tm)}
.flt{border:1.5px solid var(--border);background:var(--bg);border-radius:7px;padding:6px 10px;font-size:12px;color:var(--t2);outline:none;cursor:pointer}
.btn-add{display:flex;align-items:center;gap:5px;background:var(--acc);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-add:hover{background:#e55c28;transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,107,53,.35)}

/* ── STATS ── */
.statsbar{background:var(--white);padding:10px 24px;display:flex;gap:20px;border-bottom:1px solid var(--border);flex-shrink:0}
.sc{display:flex;align-items:center;gap:8px}
.sc-ic{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sc-v{font-size:17px;font-weight:700;line-height:1.2}
.sc-l{font-size:10px;color:var(--tm)}

/* ── BOARD ── */
.board-area{flex:1;overflow-x:auto;overflow-y:hidden;padding:20px 24px}
.board-area::-webkit-scrollbar{height:5px}
.board-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}
.board{display:flex;gap:14px;height:100%;min-width:fit-content}

/* ── COLUMN ── */
.col{width:272px;flex-shrink:0;display:flex;flex-direction:column;background:#e8eaf0;border-radius:var(--r);overflow:hidden;max-height:100%}
.col-hd{padding:12px 14px 10px;display:flex;align-items:center;gap:7px}
.col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.col-ttl{font-size:12px;font-weight:700;color:var(--t1);flex:1;text-transform:uppercase;letter-spacing:.4px}
.col-cnt{background:rgba(0,0,0,.08);color:var(--t2);font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px}
.col-add{background:none;border:none;color:var(--tm);cursor:pointer;font-size:17px;padding:1px 3px;transition:color .15s;line-height:1}
.col-add:hover{color:var(--t1)}
.col-cards{flex:1;overflow-y:auto;padding:3px 9px 10px;display:flex;flex-direction:column;gap:9px;min-height:60px}
.col-cards::-webkit-scrollbar{width:3px}
.col-cards::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px}
.col-cards.drag-over{background:rgba(255,107,53,.07);border-radius:7px}
.col-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 12px;color:var(--tm);font-size:11px;gap:4px;border:2px dashed var(--border);border-radius:7px;text-align:center;cursor:pointer;transition:all .15s;margin:0 2px}
.col-empty:hover{border-color:var(--acc);color:var(--acc)}
.col-empty-ic{font-size:18px}

/* ── CARD ── */
.card{background:var(--white);border-radius:var(--rsm);box-shadow:var(--s1);overflow:hidden;cursor:grab;transition:transform .15s,box-shadow .15s;position:relative}
.card:hover{transform:translateY(-2px);box-shadow:var(--s2)}
.card.dragging{opacity:.45;transform:rotate(2deg);cursor:grabbing}
.card-bar{height:3px;width:100%}
.card-body{padding:11px 13px}
.card-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.badge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.2px}
.badge-plt{color:#fff}
.badge-type{background:var(--bg);color:var(--t2)}
.card-title{font-size:13px;font-weight:600;color:var(--t1);line-height:1.4;margin-bottom:5px}
.card-desc{font-size:11px;color:var(--t2);line-height:1.45;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.tag{background:var(--bg);color:var(--t2);font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500}
.card-ft{display:flex;align-items:center;justify-content:space-between;padding-top:7px;border-top:1px solid var(--border)}
.card-meta{display:flex;align-items:center;gap:8px}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ph{background:#ef4444}.pm{background:#f59e0b}.pl{background:#10b981}
.card-date{font-size:10px;color:var(--tm)}
.card-stats{display:flex;gap:7px}
.cstat{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--tm);font-weight:600}
.card-btns{display:flex;gap:3px}
.cbtn{background:none;border:none;color:var(--tm);cursor:pointer;padding:3px;border-radius:4px;font-size:11px;transition:all .15s;line-height:1}
.cbtn:hover{background:var(--bg);color:var(--t1)}
.cbtn.del:hover{color:#ef4444}

/* Performance bar on published/archive */
.perf-bar-wrap{margin:6px 0 8px}
.perf-label{font-size:10px;color:var(--tm);margin-bottom:3px;display:flex;justify-content:space-between}
.perf-track{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.perf-fill{height:100%;border-radius:2px;transition:width .4s}

/* Learning note */
.learning-note{background:#f8faff;border-left:3px solid #6366f1;border-radius:0 5px 5px 0;padding:5px 8px;margin:6px 0;font-size:10px;color:#4b5563;line-height:1.4;font-style:italic}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:var(--white);border-radius:14px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--s3);animation:mIn .18s ease}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px}
.modal-hd{padding:22px 22px 0;display:flex;align-items:center;justify-content:space-between}
.modal-ttl{font-size:17px;font-weight:700}
.modal-x{background:var(--bg);border:none;width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .15s}
.modal-x:hover{background:var(--border)}
.modal-bd{padding:18px 22px 22px;display:flex;flex-direction:column;gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}
input[type=text],input[type=date],input[type=number],textarea,select{border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--t1);outline:none;transition:border-color .15s;width:100%;background:var(--white);font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:var(--acc)}
textarea{resize:vertical;min-height:66px}
.prio-opts{display:flex;gap:7px}
.popt{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;user-select:none}
.popt input{display:none}
.modal-ft{display:flex;gap:8px;justify-content:flex-end;padding-top:4px;border-top:1px solid var(--border)}
.btn-cancel{padding:8px 16px;border:1.5px solid var(--border);border-radius:7px;background:#fff;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-cancel:hover{background:var(--bg)}
.btn-save{padding:8px 20px;background:var(--acc);border:none;border-radius:7px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-save:hover{background:#e55c28}

/* Column accent lines */
.bar-ideas{background:#8b5cf6}.bar-plan{background:#3b82f6}.bar-prod{background:#f59e0b}
.bar-edit{background:#ec4899}.bar-sched{background:#10b981}.bar-pub{background:#6366f1}.bar-arch{background:#6b7280}
.dot-ideas{background:#8b5cf6}.dot-plan{background:#3b82f6}.dot-prod{background:#f59e0b}
.dot-edit{background:#ec4899}.dot-sched{background:#10b981}.dot-pub{background:#6366f1}.dot-arch{background:#6b7280}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sb">
  <div class="sb-logo">
    <div class="sb-logo-icon">✦</div>
    <span class="sb-logo-txt">ContentFlow</span>
  </div>
  <nav class="sb-nav">
    <div class="nav-sec">Espace</div>
    <div class="ni"><span class="ni-ic">⊞</span>Dashboard</div>
    <div class="ni act"><span class="ni-ic">▦</span>Kanban Board</div>
    <div class="ni"><span class="ni-ic">◫</span>Calendrier</div>
    <div class="ni"><span class="ni-ic">◈</span>Analytiques</div>
    <div class="nav-sec">Plateformes</div>
    <div class="ni"><span class="ni-ic" style="color:#ff0000">▶</span>YouTube</div>
    <div class="ni"><span class="ni-ic" style="color:#e1306c">◉</span>Instagram</div>
    <div class="ni"><span class="ni-ic" style="color:#69c9d0">♫</span>TikTok</div>
    <div class="ni"><span class="ni-ic" style="color:#3b82f6">✎</span>Blog</div>
    <div class="ni"><span class="ni-ic" style="color:#8b5cf6">●</span>Podcast</div>
    <div class="nav-sec">Système</div>
    <div class="ni"><span class="ni-ic">⚙</span>Paramètres</div>
  </nav>
  <div class="sb-foot">
    <div class="u-row">
      <div class="u-av" id="userAv">M</div>
      <div>
        <div class="u-name" id="userName">Mouhamadou</div>
        <div class="u-role">Créateur de contenu</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-l">
      <div class="page-title">Mon Contenu 📋</div>
      <div class="tabs">
        <button class="tab act" onclick="switchTab(this,'board')">Kanban</button>
        <button class="tab" onclick="switchTab(this,'list')">Liste</button>
        <button class="tab" onclick="switchTab(this,'analytics')">Analytiques</button>
      </div>
    </div>
    <div class="topbar-r">
      <div class="searchbar">
        <span style="color:var(--tm);font-size:13px">🔍</span>
        <input type="text" id="searchInput" placeholder="Rechercher..." oninput="renderBoard()">
      </div>
      <select class="flt" id="platformFilter" onchange="renderBoard()">
        <option value="">Toutes les plateformes</option>
        <option value="youtube">YouTube</option>
        <option value="instagram">Instagram</option>
        <option value="tiktok">TikTok</option>
        <option value="blog">Blog</option>
        <option value="linkedin">LinkedIn</option>
        <option value="podcast">Podcast</option>
        <option value="twitter">Twitter/X</option>
      </select>
      <button class="btn-add" onclick="openModal()">+ Nouveau contenu</button>
    </div>
  </div>

  <div class="statsbar" id="statsBar"></div>

  <div class="board-area" id="boardView">
    <div class="board" id="board"></div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-ov" id="modalOv" onclick="closeIfBg(event)">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-ttl" id="modalTtl">Nouveau contenu</div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-bd">
      <input type="hidden" id="editId">
      <div class="fg">
        <label>Titre *</label>
        <input type="text" id="fTitle" placeholder="Ex: 10 habits des créateurs productifs…">
      </div>
      <div class="fg">
        <label>Description / Notes / Angle</label>
        <textarea id="fDesc" placeholder="Idée, angle, inspiration, sources, structure…"></textarea>
      </div>
      <div class="frow">
        <div class="fg">
          <label>Plateforme</label>
          <select id="fPlatform">
            <option value="youtube">▶ YouTube</option>
            <option value="instagram">◉ Instagram</option>
            <option value="tiktok">♫ TikTok</option>
            <option value="blog">✎ Blog</option>
            <option value="linkedin">⧉ LinkedIn</option>
            <option value="podcast">● Podcast</option>
            <option value="twitter">𝕏 Twitter/X</option>
            <option value="facebook">▣ Facebook</option>
          </select>
        </div>
        <div class="fg">
          <label>Type de contenu</label>
          <select id="fType">
            <option value="Vidéo">Vidéo</option>
            <option value="Reel">Reel / Short</option>
            <option value="Post">Post</option>
            <option value="Carrousel">Carrousel</option>
            <option value="Story">Story</option>
            <option value="Article">Article</option>
            <option value="Épisode">Épisode Podcast</option>
            <option value="Thread">Thread</option>
            <option value="Live">Live</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label>Colonne</label>
          <select id="fColumn" onchange="toggleStatsGroup()">
            <option value="ideas">💡 Idées</option>
            <option value="plan">📋 Planification</option>
            <option value="prod">🎬 Production</option>
            <option value="edit">✂️ Montage</option>
            <option value="sched">📅 Programmé</option>
            <option value="pub">✅ Publié</option>
            <option value="arch">📊 Archive</option>
          </select>
        </div>
        <div class="fg">
          <label>Date cible / Publication</label>
          <input type="date" id="fDate">
        </div>
      </div>
      <div class="fg">
        <label>Priorité</label>
        <div class="prio-opts">
          <label class="popt" id="pHigh" onclick="selPrio('high')">
            <input type="radio" name="prio" value="high"> <span>● Haute</span>
          </label>
          <label class="popt" id="pMed" onclick="selPrio('med')">
            <input type="radio" name="prio" value="med" checked> <span>● Moyenne</span>
          </label>
          <label class="popt" id="pLow" onclick="selPrio('low')">
            <input type="radio" name="prio" value="low"> <span>● Basse</span>
          </label>
        </div>
      </div>
      <div class="fg">
        <label>Tags (séparés par virgules)</label>
        <input type="text" id="fTags" placeholder="ex: productivité, tutoriel, tendance">
      </div>
      <div id="grpStats" style="display:none">
        <div class="frow" style="margin-bottom:10px">
          <div class="fg">
            <label>👁 Vues</label>
            <input type="number" id="fViews" placeholder="0">
          </div>
          <div class="fg">
            <label>❤ Likes / Réactions</label>
            <input type="number" id="fLikes" placeholder="0">
          </div>
        </div>
        <div class="fg">
          <label>💡 Ce qui a marché / Ce qu'il faut améliorer</label>
          <textarea id="fLearning" placeholder="Ex: Le hook des 5 premières secondes a très bien fonctionné. Refaire ce format." style="min-height:52px"></textarea>
        </div>
        <div class="fg">
          <label>🛠 Notes de production (outils, durée, méthode)</label>
          <textarea id="fProdNotes" placeholder="Ex: Filmé en 2h, monté sur Premiere, miniature Canva, durée 12min" style="min-height:52px"></textarea>
        </div>
      </div>
      <div class="modal-ft">
        <button class="btn-cancel" onclick="closeModal()">Annuler</button>
        <button class="btn-save" onclick="saveCard()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const COLS = [
  {id:'ideas', label:'💡 Idées',       dot:'dot-ideas', bar:'bar-ideas', hint:'Capturer toutes les idées ici'},
  {id:'plan',  label:'📋 Planification',dot:'dot-plan',  bar:'bar-plan',  hint:'Recherche, script, angle en cours'},
  {id:'prod',  label:'🎬 Production',   dot:'dot-prod',  bar:'bar-prod',  hint:'Tournage, rédaction, enregistrement'},
  {id:'edit',  label:'✂️ Montage',      dot:'dot-edit',  bar:'bar-edit',  hint:'Montage, édition, relecture'},
  {id:'sched', label:'📅 Programmé',    dot:'dot-sched', bar:'bar-sched', hint:'Prêt — en attente de publication'},
  {id:'pub',   label:'✅ Publié',       dot:'dot-pub',   bar:'bar-pub',   hint:'Contenu en ligne'},
  {id:'arch',  label:'📊 Archive',      dot:'dot-arch',  bar:'bar-arch',  hint:'Analyse & apprentissages'},
];

const PLT_COLOR = {youtube:'#FF0000',instagram:'#E1306C',tiktok:'#010101',blog:'#3b82f6',linkedin:'#0077b5',podcast:'#8b5cf6',twitter:'#1da1f2',facebook:'#1877f2'};
const PLT_LBL   = {youtube:'▶ YouTube',instagram:'◉ Instagram',tiktok:'♫ TikTok',blog:'✎ Blog',linkedin:'⧉ LinkedIn',podcast:'● Podcast',twitter:'𝕏 Twitter',facebook:'▣ Facebook'};
const PAST_COLS = ['pub','arch'];

// ── SAMPLE DATA ──
let cards = [
  {id:'c1', col:'ideas', title:'10 habitudes des créateurs ultra-productifs', desc:'Angle: montrer ma propre routine. Utiliser des timestamps. Format long ~15min.', plt:'youtube', type:'Vidéo', prio:'high', date:'2026-05-12', tags:['productivité','routine','tips'], views:0, likes:0, learning:'', prodNotes:''},
  {id:'c2', col:'ideas', title:'Mon setup créatif 2026 — tour complet', desc:'Filmer le bureau entier, tous les équipements, logiciels, workflow.', plt:'youtube', type:'Vidéo', prio:'medium', date:'', tags:['setup','gear','workspace'], views:0, likes:0, learning:'', prodNotes:''},
  {id:'c3', col:'ideas', title:'Carrousel: Notion pour créateurs de contenu', desc:'Template Notion que j\'utilise quotidiennement. Angle pratique.', plt:'instagram', type:'Carrousel', prio:'low', date:'', tags:['notion','organisation'], views:0, likes:0, learning:'', prodNotes:''},

let dragId = null;
let editId = null;

// ── RENDER BOARD ──
function renderBoard() {
  const board = document.getElementById('board');
  const q = document.getElementById('searchInput').value.toLowerCase();
  const plt = document.getElementById('platformFilter').value;
  board.innerHTML = '';

  COLS.forEach(col => {
    const colCards = cards.filter(c => {
      if (c.col !== col.id) return false;
      if (plt && c.plt !== plt) return false;
      if (q && !c.title.toLowerCase().includes(q) && !(c.desc||'').toLowerCase().includes(q)) return false;
      return true;
    });

    const div = document.createElement('div');
    div.className = 'col';
    div.innerHTML = `
      <div class="col-hd">
        <span class="col-dot ${col.dot}"></span>
        <span class="col-ttl">${col.label}</span>
        <span class="col-cnt">${colCards.length}</span>
        <button class="col-add" onclick="openModal('${col.id}')" title="Ajouter">+</button>
      </div>
      <div class="col-cards" data-col="${col.id}"
        ondragover="dragOver(event)" ondrop="drop(event)" ondragleave="dragLeave(event)">
        ${colCards.length === 0
          ? `<div class="col-empty" onclick="openModal('${col.id}')">
               <div class="col-empty-ic">+</div>
               <div>${col.hint}</div>
             </div>`
          : colCards.map(c => cardHTML(c, col)).join('')}
      </div>`;
    board.appendChild(div);
  });

  renderStats();
}

function cardHTML(c, col) {
  const color = PLT_COLOR[c.plt] || '#6b7280';
  const lbl   = PLT_LBL[c.plt]   || c.plt;
  const isPast = PAST_COLS.includes(c.col);
  const engRate = c.views > 0 ? Math.min(100, Math.round((c.likes / c.views) * 100 * 10)) : 0;
  const perfPct = c.views > 0 ? Math.min(100, Math.round(c.views / 500)) : 0;
  const perfColor = perfPct > 66 ? '#10b981' : perfPct > 33 ? '#f59e0b' : '#ef4444';

  return `
  <div class="card" draggable="true" data-id="${c.id}"
    ondragstart="dragStart(event)" ondragend="dragEnd(event)">
    <div class="card-bar ${col.bar}"></div>
    <div class="card-body">
      <div class="card-badges">
        <span class="badge badge-plt" style="background:${color}">${lbl}</span>
        <span class="badge badge-type">${c.type}</span>
      </div>
      <div class="card-title">${esc(c.title)}</div>
      ${c.desc ? `<div class="card-desc">${esc(c.desc)}</div>` : ''}
      ${c.tags && c.tags.length ? `<div class="card-tags">${c.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join('')}</div>` : ''}
      ${isPast && c.views > 0 ? `
        <div class="perf-bar-wrap">
          <div class="perf-label"><span>👁 ${fmtN(c.views)} vues</span><span>❤ ${fmtN(c.likes)}</span></div>
          <div class="perf-track"><div class="perf-fill" style="width:${perfPct}%;background:${perfColor}"></div></div>
        </div>` : ''}
      ${isPast && c.learning ? `<div class="learning-note">💡 ${esc(c.learning)}</div>` : ''}
      <div class="card-ft">
        <div class="card-meta">
          <span class="pdot p${c.prio.charAt(0)}" title="Priorité ${c.prio}"></span>
          ${c.date ? `<span class="card-date">${fmtD(c.date)}</span>` : ''}
        </div>
        <div class="card-btns">
          <button class="cbtn" onclick="editCard('${c.id}')" title="Modifier">✎</button>
          <button class="cbtn del" onclick="delCard('${c.id}')" title="Supprimer">✕</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ── STATS ──
function renderStats() {
  const ideas    = cards.filter(c=>c.col==='ideas').length;
  const inprog   = cards.filter(c=>['plan','prod','edit'].includes(c.col)).length;
  const sched    = cards.filter(c=>c.col==='sched').length;
  const pubCount = cards.filter(c=>PAST_COLS.includes(c.col)).length;
  const totViews = cards.reduce((s,c)=>s+(c.views||0),0);

  document.getElementById('statsBar').innerHTML = [
    ['💡','#f3f0ff','#8b5cf6', ideas,   'Idées'],
    ['🎬','#fffbeb','#f59e0b', inprog,  'En cours'],
    ['📅','#ecfdf5','#10b981', sched,   'Programmés'],
    ['✅','#eef2ff','#6366f1', pubCount,'Publiés'],
    ['👁','#fff3ef','#ff6b35', fmtN(totViews), 'Vues totales'],
  ].map(([ic,bg,color,val,lbl])=>`
    <div class="sc">
      <div class="sc-ic" style="background:${bg}">${ic}</div>
      <div><div class="sc-v" style="color:${color}">${val}</div><div class="sc-l">${lbl}</div></div>
    </div>`).join('');
}

// ── DRAG & DROP ──
function dragStart(e) {
  dragId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.col-cards').forEach(el=>el.classList.remove('drag-over'));
}
function dragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function drop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragId) return;
  const newCol = e.currentTarget.dataset.col;
  const card = cards.find(c=>c.id===dragId);
  if (card && card.col !== newCol) { card.col = newCol; save(); renderBoard(); }
  dragId = null;
}

// ── MODAL ──
function openModal(colId='ideas') {
  editId = null;
  document.getElementById('editId').value = '';
  document.getElementById('modalTtl').textContent = 'Nouveau contenu';
  document.getElementById('fTitle').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fPlatform').value = 'youtube';
  document.getElementById('fType').value = 'Vidéo';
  document.getElementById('fColumn').value = colId;
  document.getElementById('fDate').value = '';
  document.getElementById('fTags').value = '';
  document.getElementById('fViews').value = '';
  document.getElementById('fLikes').value = '';
  document.getElementById('fLearning').value = '';
  document.getElementById('fProdNotes').value = '';
  selPrio('med');
  toggleStatsGroup();
  document.getElementById('modalOv').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(), 80);
}

function editCard(id) {
  const c = cards.find(x=>x.id===id);
  if (!c) return;
  editId = id;
  document.getElementById('editId').value = id;
  document.getElementById('modalTtl').textContent = 'Modifier le contenu';
  document.getElementById('fTitle').value = c.title;
  document.getElementById('fDesc').value = c.desc;
  document.getElementById('fPlatform').value = c.plt;
  document.getElementById('fType').value = c.type;
  document.getElementById('fColumn').value = c.col;
  document.getElementById('fDate').value = c.date || '';
  document.getElementById('fTags').value = (c.tags||[]).join(', ');
  document.getElementById('fViews').value = c.views || '';
  document.getElementById('fLikes').value = c.likes || '';
  document.getElementById('fLearning').value = c.learning || '';
  document.getElementById('fProdNotes').value = c.prodNotes || '';
  selPrio(c.prio);
  toggleStatsGroup();
  document.getElementById('modalOv').classList.add('open');
}

function closeModal() { document.getElementById('modalOv').classList.remove('open'); }
function closeIfBg(e) { if (e.target===document.getElementById('modalOv')) closeModal(); }

function toggleStatsGroup() {
  const col = document.getElementById('fColumn').value;
  document.getElementById('grpStats').style.display = PAST_COLS.includes(col) ? 'block' : 'none';
}

function saveCard() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').focus(); document.getElementById('fTitle').style.borderColor='#ef4444'; return; }
  document.getElementById('fTitle').style.borderColor='';
  const prio = document.querySelector('input[name="prio"]:checked')?.value || 'med';
  const tagsRaw = document.getElementById('fTags').value;
  const tags = tagsRaw ? tagsRaw.split(',').map(t=>t.trim()).filter(Boolean) : [];

  const data = {
    title, desc:document.getElementById('fDesc').value,
    plt:document.getElementById('fPlatform').value,
    type:document.getElementById('fType').value,
    col:document.getElementById('fColumn').value,
    date:document.getElementById('fDate').value,
    prio, tags,
    views:parseInt(document.getElementById('fViews').value)||0,
    likes:parseInt(document.getElementById('fLikes').value)||0,
    learning:document.getElementById('fLearning').value,
    prodNotes:document.getElementById('fProdNotes').value,
  };

  if (editId) {
    Object.assign(cards.find(c=>c.id===editId), data);
  } else {
    cards.push({id:'c'+Date.now(), ...data});
  }
  save(); renderBoard(); closeModal();
}

function delCard(id) {
  if (confirm('Supprimer ce contenu définitivement ?')) {
    cards = cards.filter(c=>c.id!==id);
    save(); renderBoard();
  }
}

function selPrio(val) {
  const map = {high:['#ef4444','#fef2f2'],med:['#f59e0b','#fffbeb'],low:['#10b981','#ecfdf5']};
  ['high','med','low'].forEach(k => {
    const el = document.getElementById('p'+k.charAt(0).toUpperCase()+k.slice(1));
    if (k===val) { el.style.borderColor=map[k][0]; el.style.background=map[k][1]; el.style.color=map[k][0]; }
    else { el.style.borderColor=''; el.style.background=''; el.style.color=''; }
  });
  const radio = document.querySelector(`input[name="prio"][value="${val}"]`);
  if (radio) radio.checked = true;
}

// ── TABS ──
function switchTab(btn, tab) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  // Future views placeholder
}

// ── UTILS ──
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtD(d){ if(!d) return ''; return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); }
function fmtN(n){ if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(1)+'k'; return String(n); }

// ── STORAGE ──
function save() { try { localStorage.setItem('cf_cards', JSON.stringify(cards)); } catch(e){} }
function load() { try { const s=localStorage.getItem('cf_cards'); if(s) cards=JSON.parse(s); } catch(e){} }

// ── INIT ──
load();
renderBoard();

document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if ((e.ctrlKey||e.metaKey) && e.key==='n') { e.preventDefault(); openModal(); }
});
</script>
